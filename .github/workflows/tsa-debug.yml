name: TSA fetch debug

# Temporary diagnostic: fetch the TSA passenger-volumes page from a GitHub
# runner and print what comes back, to see whether the TSA site blocks or
# challenges GitHub's servers. Run it by hand from the Actions tab. Safe to
# delete once we've diagnosed the scraper.
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch the TSA page from GitHub's server
        run: |
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/118.0.5993.70 Safari/537.36"
          URL="https://www.tsa.gov/travel/passenger-volumes"
          echo "Fetching $URL from the GitHub runner..."
          code=$(curl -s -A "$UA" -o page.html -w '%{http_code}' --max-time 60 "$URL" || echo "curl-failed")
          echo "======================================="
          echo "HTTP status code : $code"
          echo "Bytes downloaded : $(wc -c < page.html 2>/dev/null || echo 0)"
          echo "<table> tags     : $(grep -c '<table' page.html 2>/dev/null || echo 0)"
          echo "Date rows found  :"
          grep -oE '[0-9]{1,2}/[0-9]{1,2}/[0-9]{4}' page.html 2>/dev/null | head -3 || echo "  (none)"
          echo "======================================="
          echo "First 600 characters of the response:"
          head -c 600 page.html 2>/dev/null || echo "(no body)"
